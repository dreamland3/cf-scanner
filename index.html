<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Live Web Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #2c2c2e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { color: #30d158; }
        p { color: #aeaeb2; font-size: 14px; }
        button {
            background-color: #30d158;
            color: black;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .result-item {
            background: #3a3a3c;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 15px;
        }
        .latency { color: #ffd60a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 اسکنر زنده اینترنت شما</h2>
    <p>⚠️ حتماً مطمئن شوید که VPN کل گوشی شما خاموش است و صرفاً با پروکسی داخلی تلگرام متصل هستید.</p>
    
    <button id="scanBtn" onclick="startWebScan()">شروع اسکن زنده شبکه</button>
    
    <div id="status" style="margin-top: 15px; color: #ff9f0a;"></div>
    <div id="results" style="margin-top: 20px; text-align: left;"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const ipPool = [
        "172.67.0.1", "104.16.0.1", "104.24.0.1", "162.159.0.1", 
        "198.41.128.1", "141.101.64.1", "190.93.240.1", "188.114.96.1"
    ];

    async function testIPLatency(ip) {
        const start = performance.now();
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 900);

        try {
            await fetch(`https://${ip}:443`, { mode: 'no-cors', signal: controller.signal });
            clearTimeout(timeoutId);
            return Math.round(performance.now() - start);
        } catch (e) {
            const duration = performance.now() - start;
            if (duration < 900) {
                return Math.round(duration);
            }
        }
        return null;
    }

    async function startWebScan() {
        const btn = document.getElementById('scanBtn');
        const status = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        
        btn.disabled = true;
        resultsDiv.innerHTML = "";
        status.innerText = "⏳ در حال بررسی پینگ پکت‌ها روی خط شما...";

        let foundIps = [];

        for (let ip of ipPool) {
            let latency = await testIPLatency(ip);
            if (latency && latency < 500) {
                foundIps.push({ ip: ip, latency: latency });
            }
        }

        foundIps.sort((a, b) => a.latency - b.latency);

        status.innerText = "";
        btn.disabled = false;

        if (foundIps.length === 0) {
            resultsDiv.innerHTML = "<p style='color:#ff453a; text-align:center;'>❌ هیچ آی‌پی زنده‌ای یافت نشد. احتمالاً فیلترشکن شما روشن است یا اختلال شبکه بالاست.</p>";
            return;
        }

        foundIps.forEach(item => {
            const row = document.createElement('div');
            row.className = 'result-item';
            row.innerHTML = `<span>⚡ ${item.ip}</span><span class="latency">${item.latency}ms</span>`;
            resultsDiv.appendChild(row);
        });
    }
</script>
</body>
</html>
